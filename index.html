async function sbInsert(table, row) {
  try {

// ─── BKT ─────────────────────────────────────────────────────────────────────
const BKT_PARAMS = { pL0:0.3, pT:0.15, pG:0.2, pS:0.1 };
function updateBKT(prior, isCorrect) {
  const {pG,pS,pT} = BKT_PARAMS;
  const pCorrect = prior*(1-pS)+(1-prior)*pG;
  let post = isCorrect ? (prior*(1-pS))/pCorrect : (prior*pS)/(1-pCorrect);
  return Math.min(Math.max(post+(1-post)*pT, 0.01), 0.99);
}
function initBKT() {
  const b={}; SKILLS.forEach(s=>b[s.id]=BKT_PARAMS.pL0); return b;
}
function getDifficulty(v) { return v<0.5?"easy":v<0.75?"medium":"hard"; }
function normalize(text) {
  return (text||"").toLowerCase().replace(/\s+/g, " ").trim();
}
function isSimilar(q1, q2) {
  return (
    normalize(q1.questionText) === normalize(q2.questionText) ||
    (q1.code && q2.code && q1.code.trim() === q2.code.trim())
  );
}
function getFinalDifficulty(bktValue, wrongStreak, correctStreak) {
  if (wrongStreak >= 2) return "easy";
  if (correctStreak >= 3) return "hard";
  return getDifficulty(bktValue);
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// Returns a fallback question from the bank, STRICTLY avoiding already-used ones
// Uses questionText as the unique key - NEVER repeats for the same student
function getFallbackQuestion(skillId, difficulty, askedQuestions) {
  // Build a set of ALL used question texts across ALL skills (global dedup)
  const usedTexts = new Set(askedQuestions.map(q => normalize(q.questionText)));

  // Try requested difficulty first
  const bank = QUESTION_BANK[skillId]?.[difficulty] || [];
  const available = bank.filter(q => !askedQuestions.some(aq => isSimilar(q, aq)));
  if(available.length > 0) {
    const q = available[Math.floor(Math.random() * available.length)];
    return { ...q, type:"mcq", skill:skillId, difficulty, aiGenerated:false };
  }

  // Try other difficulties for this skill
  const allDiffs = ["easy","medium","hard"];
  for(const d of allDiffs) {
    if(d === difficulty) continue;
    const altBank = QUESTION_BANK[skillId]?.[d] || [];
    const altAvailable = altBank.filter(q => !askedQuestions.some(aq => isSimilar(q, aq)));
    if(altAvailable.length > 0) {
      const q = altAvailable[Math.floor(Math.random() * altAvailable.length)];
      return { ...q, type:"mcq", skill:skillId, difficulty:d, aiGenerated:false };
    }
  }

  // All bank questions for this skill are exhausted — return null (force AI retry)
  return null;
}

async function generateAIQuestion(skillId, difficulty, bktScore, wrongAnswers, sessionNum, askedQuestions=[], remediationContext=null) {
  const wrongCtx = wrongAnswers.length>0
    ? `Student previously made mistakes on: ${wrongAnswers.map(w=>w.questionText?.slice(0,60)).join("; ")}.`
    : "No prior mistakes yet.";

  // ─── Stronger deduplication: send full question texts with answer outcome ──
  const skillAsked = askedQuestions.filter(q => q.skill === skillId);
  const correctlyAnswered = skillAsked.filter(q => q.outcome === "correct");
  const wronglyAnswered   = skillAsked.filter(q => q.outcome === "wrong");
  const pendingOrReviewed = skillAsked.filter(q => q.outcome !== "correct" && q.outcome !== "wrong");

  let askedCtx = "";
  if (skillAsked.length === 0) {
    askedCtx = "No questions asked yet for this skill.";
  } else {
    const fmtQ = (q, i) => {
      let s = `${i+1}. ${q.questionText}`;
      if (q.code) s += `\n   [CODE: ${q.code.trim().replace(/\n/g," | ")}]`;
      return s;
    };
    const lines = [];
    if (correctlyAnswered.length > 0) {
      lines.push(`🚫 ALREADY MASTERED (NEVER repeat or create variants — not even with different variable names or numbers):\n${correctlyAnswered.map((q,i)=>fmtQ(q,i)).join("\n\n")}`);
    }
    if (wronglyAnswered.length > 0) {
      lines.push(`⚠️ ALREADY ASKED & MISSED (DO NOT generate again):\n${wronglyAnswered.map((q,i)=>fmtQ(q,i)).join("\n\n")}`);
    }
    if (pendingOrReviewed.length > 0) {
      lines.push(`📝 ALREADY ASKED (do not repeat — avoid the same code structure even with different values):\n${pendingOrReviewed.map((q,i)=>fmtQ(q,i)).join("\n\n")}`);
    }
    askedCtx = lines.join("\n\n");
  }

  // ─── Error-Based Remediation: target the exact misconception ──────────
  const remediationCtx = remediationContext ? `
🎯 ERROR-BASED REMEDIATION MODE — CRITICAL:
The student JUST got a question wrong on this same skill. You MUST stay on this exact concept.

Previous question they got wrong:
"${remediationContext.questionText}"
${remediationContext.code ? `Code was:\n${remediationContext.code}` : ""}

Identified misconception: "${remediationContext.misconception || "general confusion on this concept"}"
Error type: ${remediationContext.errorType || "conceptual"}

Your task NOW:
1. STAY on the EXACT same concept — do NOT switch to a different sub-topic
2. Target this specific misconception directly
3. Make this question SLIGHTLY EASIER than the previous one (simplify numbers, fewer steps, clearer structure)
4. Approach the concept from a DIFFERENT ANGLE (e.g., if previous showed values, now show types; if previous was a trace, now ask about a single line)
5. Use COMPLETELY DIFFERENT variable names, numbers, and code structure — must feel fresh, not a repeat
6. The new question should help the student SEE the misconception by example
` : "";

  // ── الطلب الأول: توليد السؤال والكود + حساب الإجابة المرجعية ─────────────
  const systemStep1 = `You are an expert Python interpreter and tutor for adaptive learning.
Your task: Generate a Python question AND compute its exact output during generation.
Skill: ${skillId} | Difficulty: ${difficulty} | BKT mastery: ${Math.round(bktScore*100)}% | Session: ${sessionNum}
${wrongCtx}

${askedCtx}
${remediationCtx}

Rules:
- easy: basic syntax/output | medium: logic/tracing | hard: edge cases/gotchas
- 🚫 ZERO TOLERANCE FOR REPETITION — questions the student has already seen are listed above. You must NEVER:
   • repeat any listed question verbatim
   • create a near-duplicate by only renaming variables (a vs x, count vs n)
   • create a near-duplicate by only changing literal numbers (5 → 7, 'Alice' → 'Bob')
   • use the same code STRUCTURE with different cosmetics (e.g. "x = 5; y = 3; print(x+y)" and "a = 10; b = 2; print(a+b)" are duplicates)
- Each new question must explore a GENUINELY DIFFERENT scenario: a different Python feature, a different edge case, a different reasoning pattern, or a different gotcha.
- Be creative: think about Python features the student hasn't seen yet for this skill.
- Return ONLY valid JSON, no markdown, no extra text

🚫 FORBIDDEN TOPICS (do NOT use these — they are too error-prone for reliable answer computation):
- itertools (chain, product, groupby, combinations, accumulate) — NEVER use this module
- copy module (copy.copy, copy.deepcopy) — NEVER import this
- functools (reduce, lru_cache, partial) — NEVER use
- Generators / yield expressions
- Lambdas nested inside lambdas (lambda x: lambda y: ...)
- Decorators (@property, @classmethod, @staticmethod, @custom)
- Walrus operator (:=)
- Multiple inheritance with diamond patterns (class C(A, B) where A and B share a parent)
- Metaclasses, __slots__, __new__, __init_subclass__
- Recursion deeper than 2 calls
- List/dict comprehensions with 3+ for-clauses or nested comprehensions
- *args/**kwargs unpacking with mixed positional+keyword
- try/except/finally with return statements in multiple branches
- Bitwise operators (&, |, ^, <<, >>) unless skill is explicitly about them
- Any module imports OTHER than basic ones — and even then, prefer code with NO imports
- Walrus, match/case, async/await, type hints with generics
- String * int or string * string repetition (e.g. 'x' * 5, '-' * 10) — NEVER use. The output is ambiguous between '55555' and 55555 and models consistently mislabel correctIndex.
- String + string concatenation in print (e.g. print('Hello' + name)) — use f-strings or separate prints instead
- Float arithmetic that produces decimals (e.g. 3.14 * 5, 1/3, 10/4) — output rounding is unreliable. Use integer-only arithmetic.
- print() with end= or sep= parameters — output formatting is error-prone
- f-strings with any expression inside braces (e.g. f'{x*2}', f'{len(s)}') — use plain variable reference only: f'{x}'
- Type casting chains (e.g. int(float(str(x)))) — too many conversion steps
- round(), abs(), max(), min() with floats — rounding behavior is unreliable
- Any question whose correct answer could be confused with/without quotes (e.g. '5' vs 5, 'True' vs True)
- set() or dict with keys that involve bool/int overlap (e.g. {1, True, 1.0}) — hash equality is unreliable to compute mentally
- String methods that return new strings (.upper(), .replace(), .strip()) used as the SOLE output — the output format with/without quotes is ambiguous in multiple choice

✅ PREFERRED PATTERNS (you compute these reliably):
- Plain integer arithmetic and assignments: x = 5, y += 2, z *= 3, x % 2, x // 3
- Simple if/elif/else with integer comparisons: x > 5, x == 0, x != y
- Boolean logic with and/or/not on simple conditions
- for loops over range() with integer results: for i in range(5): total += i
- while loops with simple integer counters
- List operations with integers: append, pop, sort, reverse, indexing [i], slicing [a:b]
- print() of a single integer variable or integer expression — output is always unambiguous
- print() of a list of integers — output format [1, 2, 3] is unambiguous
- print() of True/False/None — unambiguous
- def with positional args and at most ONE default value, returning integers or lists
- Single-level closures with nonlocal (only if skill = functions)
- Single-inheritance classes with __init__ and one or two regular methods returning integers or strings stored in self
- Method overriding (parent → child) without super() chains beyond 1 level
- Simple f-string with ONE plain variable: f'{name}' or f'{x}' — no expressions inside

🎯 KEEP CODE SHORT: 3-8 lines maximum. If you cannot phrase a "hard" question within 8 lines using ALLOWED patterns, prefer a shorter "medium" with a subtle gotcha (e.g. mutable default arg, integer immutability, scope shadow, slice exclusivity).

🔑 CRITICAL — COMPUTE THE ANSWER NOW (before returning):
You MUST mentally execute the code line-by-line as a Python interpreter would.
- Track every variable's value at every line.
- Account for: operator precedence, integer vs float division, string vs int types,
  list mutation vs reassignment, scope (local/global/nonlocal), default mutable args,
  short-circuit evaluation, slice bounds (start inclusive, stop exclusive),
  range() boundaries (range(n) goes 0..n-1), method overriding, MRO.
- The "expectedOutput" field MUST be the EXACT string Python's print() would emit:
  exact spacing, capitalization, brackets, quotes, newlines.
- For lists: use Python's repr format with spaces after commas, e.g. "[1, 2, 3]" not "[1,2,3]".
- For multiple print() calls: join with newlines (\\n) in the order they execute.
- For conceptual questions (no code), expectedOutput is the correct conceptual answer text.
- If you are uncertain, RE-EXECUTE from scratch before writing the JSON.

Required JSON format:
{"questionText":"...use \\n for newlines...","code":"...Python code string or null...","expectedOutput":"EXACT output Python would print, character-for-character","misconception":"...","type":"mcq","errorType":"conceptual or syntax or logical","traceSteps":[{"line":"code line text","vars":{"varName":"value"},"highlight":"varName or null","note":"explanation of this step","output":"printed output or null"}]}

CRITICAL for traceSteps:
- Include traceSteps ONLY if code is not null
- Each step shows one logical execution step
- vars shows ALL variable states after this step
- highlight shows which variable changed (or null)
- output shows cumulative printed output (or null if nothing printed yet)
- note explains what happened in plain English
- Keep 3-6 steps total
- The FINAL step's "output" field MUST equal the top-level "expectedOutput" field`;

  // ── الطلب الثاني: توليد الخيارات + إعادة حساب الجواب (cross-check مع Step 1) ──
  async function generateOptions(questionText, code, expectedFromStep1) {
    const systemStep2 = `You are a strict Python interpreter and test designer. You will be given a Python question and code.

🔑 PRIMARY DIRECTIVE: Compute the CORRECT answer FIRST, before designing any options.

Phase A — EXECUTE (think step by step):
1. Mentally run the code line-by-line as a real Python 3 interpreter.
2. Track every variable, every reassignment, every scope, every type.
3. Determine the EXACT output Python's print() would emit.
4. Re-execute from scratch to verify. If your two executions disagree, execute a THIRD time and pick the answer your reasoning supports.

Phase B — DESIGN OPTIONS:
5. The "correctAnswer" string is the verified output from Phase A.
6. Generate exactly 3 WRONG but plausible distractors. Each must reflect a real student mistake:
   - off-by-one (e.g., range(3) → "1 2 3" instead of "0 1 2")
   - type confusion (e.g., '5'+'3' → "8" instead of "53")
   - scope errors (e.g., local vs global)
   - operator precedence errors
   - boundary errors (slice end inclusive vs exclusive)
7. Do NOT make any distractor accidentally equal to the correct answer.
8. Place all 4 options in the array. RANDOMIZE position — the correct answer must NOT always be first or last. Pick a random index 0..3 for it.

Phase C — SELF-CHECK BEFORE RETURNING:
9. Verify "correctAnswer" appears in "options" character-for-character (same spacing, brackets, quotes, case).
10. Verify the 3 wrong options are all different from the correct one and from each other.
11. State "correctIndex" = the 0-based index of correctAnswer in options. Verify options[correctIndex] === correctAnswer.

🚨 ABSOLUTE RULES:
- The correctAnswer MUST match what Python actually prints. NEVER label a wrong output as correct.
- For lists, dicts, tuples: use Python's repr format with spaces after commas: "[1, 2, 3]", "{'a': 1}".
- For multiple prints: join with literal \\n in execution order.
- correctIndex MUST be an integer 0, 1, 2, or 3 — and options[correctIndex] MUST equal correctAnswer exactly.
- Return ONLY valid JSON, no markdown, no commentary.

Required JSON format:
{"reasoning":"brief 1-2 sentence trace of how you computed the answer","options":["...","...","...","..."],"correctAnswer":"exact correct output","correctIndex":0,"explanation":"step-by-step explanation of the execution and why each wrong option is wrong"}`;

    const hint = expectedFromStep1
      ? `\n\nReference output computed during question generation: ${JSON.stringify(expectedFromStep1)}\nUse this as a sanity check, but RE-EXECUTE the code yourself. If your execution disagrees, trust your own execution and explain in "reasoning".`
      : "";
    const userMsg = `Question: ${questionText}\nCode:\n${code||"(no code, conceptual question)"}${hint}`;
    const raw2 = await callGroq([{role:"user",content:userMsg}], systemStep2, 800);
    const parsed2 = JSON.parse(raw2.replace(/```json|```/g,"").trim());

    // ─── 🛡️ STRICT VALIDATION 1: structural integrity ────────────────────
    if (!Array.isArray(parsed2.options) || parsed2.options.length !== 4) {
      throw new Error("Step2: must have exactly 4 options");
    }
    if (typeof parsed2.correctAnswer !== "string" || !parsed2.correctAnswer.length) {
      throw new Error("Step2: correctAnswer missing");
    }
    // Must have unique options
    const uniq = new Set(parsed2.options.map(o => (o||"").trim()));
    if (uniq.size !== 4) {
      throw new Error("Step2: duplicate options detected");
    }

    // ─── 🛡️ STRICT VALIDATION 2: find correctAnswer in options ──────────
    let idx = parsed2.options.findIndex(o => o === parsed2.correctAnswer);
    if(idx === -1) idx = parsed2.options.findIndex(o => o.trim() === parsed2.correctAnswer.trim());
    if(idx === -1) {
      const target = parsed2.correctAnswer.trim().toLowerCase();
      idx = parsed2.options.findIndex(o => o.trim().toLowerCase() === target);
    }
    if(idx === -1) {
      const target = parsed2.correctAnswer.replace(/\s+/g,"");
      idx = parsed2.options.findIndex(o => o.replace(/\s+/g,"") === target);
    }
    if(idx === -1) {
      const target = parsed2.correctAnswer.trim();
      idx = parsed2.options.findIndex(o => o.includes(target) || target.includes(o.trim()));
    }
    if(idx === -1) throw new Error("Step2: correctAnswer not found in options");

    // ─── 🛡️ STRICT VALIDATION 3: AI-reported correctIndex must agree ────
    if (typeof parsed2.correctIndex === "number" && parsed2.correctIndex !== idx) {
      console.warn(`Step2 mismatch: AI said correctIndex=${parsed2.correctIndex} but correctAnswer "${parsed2.correctAnswer}" is at index ${idx}. Trusting string match.`);
    }

    return {...parsed2, correctIndex: idx};
  }

  // ── الطلب الثالث (verifier): مدقّق مستقل يعيد الحساب بدون رؤية الخيارات ──
  async function verifyAnswer(questionText, code) {
    if (!code) return null; // skip verification for conceptual questions without code
    const systemVerify = `You are a strict Python 3 interpreter. Your ONLY job is to execute code and report the exact output.

You will receive a Python code snippet. Do the following:
1. Execute it line-by-line as a real Python interpreter would.
2. Track every variable, scope, type conversion, and side effect.
3. Re-execute from scratch as a sanity check.
4. Report EXACTLY what Python's stdout would contain — character-for-character.

Format rules:
- Lists/dicts/tuples in Python repr: "[1, 2, 3]", "{'key': 'val'}", "(1, 2)" — spaces after commas.
- Multiple print() calls separated by literal \\n.
- Booleans: "True" / "False" (capitalized).
- None: "None".
- If the code raises an exception, output is the exception name, e.g. "TypeError" or "IndexError".
- If there is no print and no implicit output, output is empty string "".

Return ONLY this JSON, no commentary:
{"output":"exact stdout","confidence":"high|medium|low"}`;

    const userMsg = `Execute this Python code and report the exact stdout:\n\n${code}`;
    try {
      const raw = await callGroq([{role:"user",content:userMsg}], systemVerify, 300);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      return parsed; // {output, confidence}
    } catch(e) {
      console.warn("Verifier failed:", e.message);
      return null;
    }
  }

  // ── أداة مقارنة مرنة بين مخرجين متوقعين ──────────────────────────────────
  function outputsMatch(a, b) {
    if (a == null || b == null) return false;
    if (a === b) return true;
    if (a.trim() === b.trim()) return true;
    if (a.trim().toLowerCase() === b.trim().toLowerCase()) return true;
    if (a.replace(/\s+/g,"") === b.replace(/\s+/g,"")) return true;
    return false;
  }

  // ─── Similarity check: reject AI question if too similar to already asked ──
  function isTooSimilar(newQ) {
    const newText = newQ.questionText?.trim().toLowerCase() || "";

    // ── 1. Exact text match ───────────────────────────────────────────────────
    const usedTexts = new Set(askedQuestions.map(q => q.questionText?.trim().toLowerCase()));
    if(usedTexts.has(newText)) return true;

    // ── 2. Normalized text match (strip variable names & numbers) ────────────
    const normQ = (t) => t.replace(/[a-z_]\w*/gi,"VAR").replace(/\d+/g,"NUM").replace(/\s+/g," ").trim().toLowerCase();
    const newNorm = normQ(newText);
    for(const asked of askedQuestions) {
      if(normQ(asked.questionText?.trim().toLowerCase()||"") === newNorm) return true;
    }

    // ── Helper: Jaccard similarity on token sets ──────────────────────────────
    function jaccardTokens(a, b) {
      const tokA = new Set(a.match(/\w+/g) || []);
      const tokB = new Set(b.match(/\w+/g) || []);
      if(tokA.size === 0 && tokB.size === 0) return 1;
      let inter = 0;
      tokA.forEach(t => { if(tokB.has(t)) inter++; });
      return inter / (tokA.size + tokB.size - inter);
    }

    // ── 3. Token-set (Jaccard) similarity on question text ───────────────────
    // Threshold: 0.70 means 70% token overlap → reject as too similar
    for(const asked of askedQuestions) {
      const sim = jaccardTokens(newText, asked.questionText?.trim().toLowerCase()||"");
      if(sim >= 0.70) return true;
    }

    if(!newQ.code) return false;

    // ── 4. Structural code match (strip vars + digits) ────────────────────────
    const stripVars = (c) => c.replace(/[a-z_]\w*/gi,"V").replace(/\d+/g,"N").replace(/\s+/g,"");
    const newStripped = stripVars(newQ.code.toLowerCase());
    for(const asked of askedQuestions) {
      if(!asked.code) continue;
      if(stripVars(asked.code.toLowerCase()) === newStripped) return true;
    }

    // ── 5. Jaccard similarity on code tokens (tighter threshold) ─────────────
    // Threshold: 0.55 for wrong/pending, 0.40 for correctly answered
    const newCodeTok = newQ.code.toLowerCase();
    for(const asked of askedQuestions) {
      if(!asked.code) continue;
      const threshold = asked.outcome === "correct" ? 0.40 : 0.55;
      const sim = jaccardTokens(newCodeTok, asked.code.toLowerCase());
      if(sim >= threshold) return true;
    }

    return false;
  }

  // ─── 🚫 Forbidden-pattern filter: reject code that uses error-prone features ──
  // These patterns are known to confuse llama-3.3 reliably, even with verification.
  // Cheaper to reject and retry than to generate a wrong answer.
  function hasForbiddenPattern(code) {
    if (!code) return null;
    const c = code;
    // Modules / imports we don't trust
    if (/\bimport\s+itertools\b/.test(c) || /\bfrom\s+itertools\b/.test(c)) return "itertools";
    if (/\bimport\s+copy\b/.test(c) || /\bfrom\s+copy\b/.test(c)) return "copy module";
    if (/\bimport\s+functools\b/.test(c) || /\bfrom\s+functools\b/.test(c)) return "functools";
    if (/\bimport\s+collections\b/.test(c)) return "collections";
    if (/\bimport\s+re\b/.test(c)) return "re module";
    if (/\bimport\s+math\b/.test(c)) return "math module"; // even math.* can trip the model
    // Generators
    if (/\byield\b/.test(c)) return "yield/generator";
    // Decorators (any @something)
    if (/^\s*@\w/m.test(c)) return "decorator";
    // Walrus operator
    if (/:=/.test(c)) return "walrus operator";
    // match/case
    if (/^\s*match\s+\w+\s*:/m.test(c)) return "match/case";
    // async/await
    if (/\b(async|await)\b/.test(c)) return "async/await";
    // Nested lambdas (lambda inside lambda)
    if (/lambda[^:]*:[^,)]*lambda/.test(c)) return "nested lambda";
    // Multiple inheritance: class X(A, B)
    if (/class\s+\w+\s*\(\s*\w+\s*,\s*\w+/.test(c)) return "multiple inheritance";
    // __slots__, __new__, metaclass=
    if (/__slots__|__new__|metaclass\s*=/.test(c)) return "advanced dunder";
    // Triple-nested comprehensions: list with 3+ "for" inside brackets
    const compMatch = c.match(/\[[^\]]*for\s+\w+\s+in[^\]]*for\s+\w+\s+in[^\]]*for\s+\w+\s+in/);
    if (compMatch) return "3-level comprehension";
    // Code longer than 12 lines
    if (c.split("\n").length > 12) return "code too long (>12 lines)";
    return null;
  }

  async function attemptGenerate() {
    const raw1 = await callGroq([{role:"user",content:`Generate a UNIQUE Python ${difficulty} question about ${skillId}. It must be completely different from any previous question.`}], systemStep1, 800);
    const step1 = JSON.parse(raw1.replace(/```json|```/g,"").trim());

    // Reject if too similar
    if(isTooSimilar(step1)) {
      throw new Error("Generated question too similar to previously asked");
    }

    // 🚫 Reject if code uses a forbidden/error-prone pattern
    const forbidden = hasForbiddenPattern(step1.code);
    if (forbidden) {
      throw new Error(`Question uses forbidden pattern: ${forbidden}`);
    }

    // ─── Step 1 must include expectedOutput (computed during generation) ──
    const step1Expected = step1.expectedOutput;

    // ─── Step 2: generate options + recompute answer (uses step1Expected as soft hint) ──
    const step2 = await generateOptions(step1.questionText, step1.code, step1Expected);

    // ─── Step 3: independent verifier (only if there's code) ──────────────
    // The verifier doesn't see the options or step2's reasoning — pure execution.
    let verifierOutput = null;
    if (step1.code) {
      const verifyResult = await verifyAnswer(step1.questionText, step1.code);
      if (verifyResult && verifyResult.confidence !== "low") {
        verifierOutput = verifyResult.output;
      }
    }

    // ─── 🛡️ TRIANGULATION: cross-check Step1 ↔ Step2 ↔ Verifier ──────────
    // We require at least 2 of 3 sources to agree on the correct answer.
    const sources = {
      step1: step1Expected,
      step2: step2.correctAnswer,
      verifier: verifierOutput,
    };
    const validSources = Object.entries(sources).filter(([k,v]) => v != null && v !== "");

    if (step1.code && validSources.length >= 2) {
      // Count agreements with step2.correctAnswer (the one used in the UI)
      const agreements = validSources.filter(([k,v]) => outputsMatch(v, step2.correctAnswer)).length;

      if (agreements < 2) {
        // Step2 is the OUTLIER — the verifier and step1 disagree with step2's choice.
        // Try to find the majority answer.
        const counts = {};
        validSources.forEach(([k,v]) => {
          const key = (v||"").trim();
          counts[key] = (counts[key]||0) + 1;
        });
        const majority = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
        if (majority && majority[1] >= 2) {
          // There IS a majority answer that disagrees with step2.correctAnswer.
          // Try to find that majority answer in the options array.
          const majorityAnswer = majority[0];
          let newIdx = step2.options.findIndex(o => outputsMatch(o, majorityAnswer));
          if (newIdx !== -1) {
            console.warn(`Triangulation: Step2 said "${step2.correctAnswer}" but majority (${majority[1]}/3) says "${majorityAnswer}". Correcting correctIndex to ${newIdx}.`);
            step2.correctAnswer = step2.options[newIdx];
            step2.correctIndex = newIdx;
          } else {
            // Majority answer isn't even in the options — the question is unreliable. Reject.
            throw new Error(`Triangulation failed: sources disagree (step1="${step1Expected}", step2="${step2.correctAnswer}", verifier="${verifierOutput}") and majority answer not in options`);
          }
        } else {
          // No 2-of-3 majority at all — full disagreement. Reject the question.
          throw new Error(`Triangulation failed: no consensus (step1="${step1Expected}", step2="${step2.correctAnswer}", verifier="${verifierOutput}")`);
        }
      }
    }

    // ─── 🛡️ FINAL SANITY CHECK: options[correctIndex] === correctAnswer ──
    if (step2.options[step2.correctIndex] !== step2.correctAnswer) {
      const realIdx = step2.options.findIndex(o => o === step2.correctAnswer);
      if (realIdx === -1) {
        throw new Error("Final check: correctAnswer not in options exactly");
      }
      step2.correctIndex = realIdx;
    }

    return {
      questionText: step1.questionText,
      code: step1.code,
      misconception: step1.misconception,
      type: "mcq",
      errorType: step1.errorType || "conceptual",
      options: step2.options,
      correctIndex: step2.correctIndex,
      correctAnswer: step2.correctAnswer,
      explanation: step2.explanation,
      skill: skillId,
      difficulty,
      aiGenerated: true,
      traceSteps: step1.traceSteps || null,
      // 🔍 debug: keep for troubleshooting
      _verification: { step1: step1Expected, step2: step2.correctAnswer, verifier: verifierOutput }
    };
  }

  // ─── 5 attempts with increasing creativity ────────────────────────────
  try { return await attemptGenerate(); }
  catch(e1) {
    try { return await attemptGenerate(); }
    catch(e2) {
      try { return await attemptGenerate(); }
      catch(e3) {
        try { return await attemptGenerate(); }
        catch(e4) {
          try { return await attemptGenerate(); }
          catch(e5) {
            const fallback = getFallbackQuestion(skillId, difficulty, askedQuestions);
            if (fallback) return fallback;
            throw new Error("Question bank exhausted");
          }
        }
      }
    }
  }
}

function getFallbackFeedback(errorType) {
  const type = (errorType === "conceptual" || errorType === "logical" || errorType === "syntax") ? errorType : "conceptual";
  const bank = FEEDBACK_BANK[type];
  return bank[Math.floor(Math.random() * bank.length)];
}

function getFallbackSkillSummary(skillId, bktScore) {
  const skill = SKILL_SUMMARY_BANK[skillId];
  if (!skill) {
    if (bktScore >= 0.75) return "Great work on this skill! You've shown solid understanding throughout the training. Keep building on this foundation.";
    if (bktScore >= 0.50) return "Good progress on this skill, with room to grow. Review the concepts that gave you trouble, and you'll see steady improvement.";
    return "This skill needs more practice. Don't be discouraged — the topics that challenge us most are often the ones we end up understanding most deeply.";
  }
  if (bktScore >= 0.75) return skill.high;
  if (bktScore >= 0.50) return skill.medium;
  return skill.low;
}

async function generateAIFeedback(question, selectedIdx, bktScore) {
  const errorType = question.errorType || "conceptual";
  let strategy = "";
  if (errorType === "conceptual") {
    strategy = `This is a CONCEPTUAL error. Use the Socratic method: ask 1-2 guiding questions that lead the student to discover the correct concept themselves. Do NOT give the answer directly. Example: "What do you think happens when Python sees a decimal number? What type would that be?"`;
  } else if (errorType === "logical") {
    strategy = `This is a LOGICAL/tracing error. Walk through the code STEP BY STEP, showing the state of each variable at each line, but STOP just before revealing the final answer. Let the student trace the last step. Example: "Let's trace: line 1 sets x=10, line 2 adds 5 so x=15, now what does line 3 do to x?"`;
  } else if (errorType === "syntax") {
    strategy = `This is a SYNTAX error. Show a VISUAL COMPARISON between what the student might be confusing. Use a mini side-by-side format. Example: "Compare these two:\n❌ x == 10  →  This CHECKS if x equals 10\n✅ x = 10   →  This ASSIGNS 10 to x\nSee the difference?"`;
  }
  const system = `You are a Python tutor giving targeted feedback based on error type.\n${strategy}\nKeep it to 2-3 sentences max. Plain text only, no markdown.`;
  try {
    return await callGroq([{role:"user",content:`Question: ${question.questionText}\nError Type: ${errorType}\nStudent chose: "${question.options[selectedIdx]}"\nCorrect: "${question.options[question.correctIndex]}"\nBKT: ${Math.round(bktScore*100)}%`}], system, 200);
  } catch(e) {
    console.warn("AI feedback unavailable, using fallback bank:", e.message);
    return getFallbackFeedback(errorType);
  }
}

async function generateSkillSummary(skillId, bktScore, correct, total) {
  const system = `You are a Python learning coach. Write 1-2 sentences of encouraging feedback for a student who completed skill training. Be specific and motivating. Plain text only.`;
  try {
    return await callGroq([{role:"user",content:`Student finished ${skillId}. Score: ${correct}/${total}. BKT: ${Math.round(bktScore*100)}%.`}], system, 100);
  } catch(e) {
    console.warn("AI summary unavailable, using fallback bank:", e.message);
    return getFallbackSkillSummary(skillId, bktScore);
  }
}

const TEST_QUESTIONS_PER_SKILL = 5;

function buildBalancedTestQuestions(baseQuestions, perSkill=TEST_QUESTIONS_PER_SKILL) {
  const balanced = [];
  SKILLS.forEach(skill => {
    const picked = [];
    const addUnique = (q, fallbackDifficulty=null) => {
      if (!q || picked.length >= perSkill) return;
      const candidate = {
        ...q,
        skill: q.skill || skill.id,
        difficulty: q.difficulty || fallbackDifficulty || "medium",
        type: q.type || "mcq",
      };
      if (!picked.some(existing => isSimilar(candidate, existing))) picked.push(candidate);
    };

    baseQuestions.filter(q => q.skill === skill.id).forEach(addUnique);
    ["easy","medium","hard"].forEach(difficulty => {
      (QUESTION_BANK[skill.id]?.[difficulty] || []).forEach(q => addUnique(q, difficulty));
    });
    balanced.push(...picked.slice(0, perSkill));
  });
  return balanced;
}

}

function CodeTracer({steps, isOpen, onToggle}) {
  const [currentStep, setCurrentStep] = useState(-1);
  const [tracerStartTime] = useState(Date.now());

  if (!steps || steps.length === 0) return null;

  const step = currentStep >= 0 ? steps[currentStep] : null;
  const isEnd = currentStep >= steps.length - 1;
  const isStart = currentStep < 0;

  return (
    <div style={{marginTop:10}}>
      <button onClick={onToggle} style={{
        width:"100%",padding:"10px 14px",borderRadius:8,
        border:`1px solid ${C.accent}44`,background:`${C.accent}11`,
        color:C.accentL,fontSize:12,fontFamily:font,fontWeight:700,
        cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8,
        transition:"all 0.2s"
      }}>
        <span style={{display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",fontSize:10}}>▶</span>
        {isOpen ? "Hide Code Tracer" : "🔍 Show Code Tracer — step by step"}
      </button>

      {isOpen && (
        <div style={{marginTop:10,background:C.code,border:`1px solid ${C.border}`,borderRadius:10,padding:16,animation:"fadeIn 0.3s ease"}}>
          {/* Code lines */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:9,color:C.textM,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Code Trace</div>
            {steps.map((s, i) => {
              const isActive = currentStep === i;
              const isPast = currentStep > i;
              return (
                <div key={i} style={{
                  fontFamily:font,fontSize:12,padding:"5px 10px",margin:"2px 0",borderRadius:4,
                  background:isActive?`${C.accent}22`:"transparent",
                  borderLeft:isActive?`2px solid ${C.accent}`:"2px solid transparent",
                  color:isActive?C.accentL:isPast?C.textD:`${C.textM}88`,
                  transition:"all 0.2s",whiteSpace:"pre-wrap"
                }}>
                  {s.line}
                </div>
              );
            })}
          </div>

          {/* Variables */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:9,color:C.textM,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Variables</div>
            {step ? (
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {Object.entries(step.vars).map(([k, v]) => {
                  const isHL = step.highlight === k;
                  return (
                    <div key={k} style={{
                      background:isHL?`${C.warning}22`:C.bgCard,
                      border:`1px solid ${isHL?`${C.warning}66`:C.border}`,
                      borderRadius:6,padding:"4px 10px",fontFamily:font,fontSize:11,
                      transition:"all 0.3s"
                    }}>
                      <span style={{color:C.textM}}>{k}</span>
                      <span style={{color:C.textM}}> = </span>
                      <span style={{color:isHL?C.warning:C.text,fontWeight:isHL?700:400}}>{String(v)}</span>
                    </div>
                  );
                })}
                {step.output && (
                  <div style={{
                    background:`${C.success}11`,border:`1px solid ${C.success}33`,
                    borderRadius:6,padding:"4px 10px",fontFamily:font,fontSize:11
                  }}>
                    <span style={{color:C.success}}>output: {step.output}</span>
                  </div>
                )}
              </div>
            ) : (
              <div style={{fontSize:11,color:C.textM,fontFamily:font}}>Press "Next step" to start</div>
            )}
          </div>

          {/* Note */}
          {step && step.note && (
            <div style={{
              background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:6,
              padding:"8px 12px",marginBottom:12,fontSize:11,color:C.textD,
              fontFamily:font,lineHeight:1.5
            }}>
              {step.note}
            </div>
          )}

          {/* Controls */}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={() => currentStep > -1 && setCurrentStep(currentStep - 1)}
              disabled={isStart}
              style={{
                padding:"6px 14px",borderRadius:6,border:`1px solid ${C.border}`,
                background:"transparent",color:C.textD,fontSize:11,fontFamily:font,
                cursor:isStart?"default":"pointer",opacity:isStart?0.3:1
              }}>Previous</button>
            <button onClick={() => !isEnd && setCurrentStep(currentStep + 1)}
              style={{
                padding:"6px 14px",borderRadius:6,
                border:`1px solid ${isEnd?C.success:C.accent}`,
                background:isEnd?`${C.success}22`:`${C.accent}22`,
                color:isEnd?C.success:C.accentL,fontSize:11,fontFamily:font,fontWeight:700,
                cursor:isEnd?"default":"pointer",opacity:isEnd?0.6:1
              }}>{isEnd?"✓ Complete":"Next step →"}</button>
            <span style={{fontSize:10,color:C.textM,fontFamily:font,marginLeft:"auto"}}>
              {Math.max(0, currentStep + 1)} / {steps.length}
            </span>
          </div>
        </div>
      )}
    </div>
  );
}

function ProgressBar({value,max=100,color=C.accent,height=8,label}) {
  return (
    <div style={{width:"100%"}}>
      {label&&<div style={{fontSize:11,color:C.textD,marginBottom:4}}>{label}</div>}
      <div style={{background:C.border,borderRadius:height/2,height,overflow:"hidden"}}>
        <div style={{width:`${Math.min(100,(value/max)*100)}%`,height:"100%",background:color,borderRadius:height/2,transition:"width 0.5s ease"}}/>
      </div>
    </div>
  );
}

function ScoreRing({score,size=160}) {
  const pct=Math.round(score*100), r=size/2-12, circ=2*Math.PI*r;
  const color=pct>=80?C.success:pct>=60?C.warning:C.error;
  return (
    <svg width={size} height={size} style={{display:"block",margin:"0 auto"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={8}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
        strokeDasharray={circ} strokeDashoffset={circ*(1-score)} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 1s ease"}}/>
      <text x={size/2} y={size/2-8} textAnchor="middle" fill={color} fontSize={32} fontFamily={font} fontWeight="bold">{pct}%</text>
      <text x={size/2} y={size/2+18} textAnchor="middle" fill={C.textD} fontSize={12} fontFamily={sans}>Score</text>
    </svg>
  );
}

function SkillScorePanel({bkt,currentSkill,weakSkills}) {
  return (
    <div style={{position:"fixed",right:16,top:"50%",transform:"translateY(-50%)",background:C.bgSidebar,border:`1px solid ${C.borderL}`,borderRadius:14,padding:"14px 12px",width:180,boxShadow:"0 4px 24px rgba(0,0,0,0.5)",zIndex:100}}>
      <div style={{fontSize:10,color:C.textM,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:10,textAlign:"center"}}>📊 Skill Mastery</div>
      {SKILLS.map(s=>{
        const pct=Math.round(bkt[s.id]*100);
        const isCurrent=currentSkill===s.id, isMastered=pct>=MASTERY_THRESHOLD*100, isWeak=weakSkills.includes(s.id);
        const color=isMastered?C.success:isWeak?C.accentL:C.textD;
        return (
          <div key={s.id} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
              <span style={{fontSize:10,fontFamily:font,color,fontWeight:isCurrent?"bold":"normal"}}>{s.icon} {s.id}</span>
              <span style={{fontSize:10,fontFamily:font,color:isMastered?C.success:C.textD,fontWeight:700}}>{pct}%</span>
            </div>
            <div style={{background:C.border,borderRadius:4,height:5,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:isMastered?C.success:isCurrent?C.accent:C.textM,borderRadius:4,transition:"width 0.5s ease"}}/>
            </div>
            {isCurrent&&!isMastered&&<div style={{fontSize:9,color:C.warning,fontFamily:font,marginTop:2}}>Need {Math.round(MASTERY_THRESHOLD*100)}% to advance ↑</div>}
            {isMastered&&<div style={{fontSize:9,color:C.success,fontFamily:font,marginTop:2}}>✓ Mastered</div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── SESSION PERSISTENCE ─────────────────────────────────────────────────────
const SESSION_KEY = (email) => `pythonmastery_session_${email.toLowerCase().trim()}`;

function saveSession(email, data) {
  try { localStorage.setItem(SESSION_KEY(email), JSON.stringify({...data, savedAt: Date.now()})); } catch(e) {}
}
function loadSession(email) {
  try { const d = localStorage.getItem(SESSION_KEY(email)); return d ? JSON.parse(d) : null; } catch { return null; }
}
function clearSession(email) {
  try { localStorage.removeItem(SESSION_KEY(email)); } catch(e) {}
}

  const [trainAnswers,setTrainAnswers]=useState([]);
  const [skillAnswers,setSkillAnswers]=useState([]);
  const [streak,setStreak]=useState(0);
  const [wrongCount,setWrongCount]=useState(0);
  const [sessionLog,setSessionLog]=useState([]);
  const [aiFeedback,setAiFeedback]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [showTracer,setShowTracer]=useState(false);
  const [skillSummary,setSkillSummary]=useState(null);
  const [showSkillComplete,setShowSkillComplete]=useState(false);
  const [questionCount,setQuestionCount]=useState(0);
  const [genProgress,setGenProgress]=useState(0);
  const [genStep,setGenStep]=useState(0);
  const [genError,setGenError]=useState(null);
  const [askedQuestions,setAskedQuestions]=useState([]);
  // askedQuestions items now carry: { ...question, outcome: "correct"|"wrong"|"pending", reviewedOnce: boolean }
  // - outcome: how the student answered it (set after handleTrainAnswer)
  // - reviewedOnce: true once a wrong question has been re-shown via spaced repetition

  // ─── Spaced Repetition Queue ───────────────────────────────────────────────
  const [spacedQueue,setSpacedQueue]=useState([]); // [{question, showAfterCount}]
  const [questionsSinceWrong,setQuestionsSinceWrong]=useState(0);

  // ─── Per-ErrorType Tracking ───────────────────────────────────────────────
  // Tracks {asked, correct} counts per errorType (conceptual/logical/syntax)
  const [errorTypeStats,setErrorTypeStats]=useState({conceptual:{asked:0,correct:0},logical:{asked:0,correct:0},syntax:{asked:0,correct:0}});

  // ─── Response Time Tracking ────────────────────────────────────────────────
  const [questionStartTime,setQuestionStartTime]=useState(null);
  const [responseTimes,setResponseTimes]=useState([]); // [{skill, difficulty, timeMs, correct, errorType}]

  // ─── Mastery Gate Stats ────────────────────────────────────────────────────
  const [skillCorrectStreak,setSkillCorrectStreak]=useState(0); // consecutive correct for current skill
  const [wrongStreak,setWrongStreak]=useState(0);
  const [correctStreak,setCorrectStreak]=useState(0);
  const [difficultySource,setDifficultySource]=useState("bkt");
  const [lastWrongQuestion,setLastWrongQuestion]=useState(null); // {questionText, code, misconception, errorType, skill, difficulty}
  const [remediationActive,setRemediationActive]=useState(false);
  const [remediationCount,setRemediationCount]=useState(0);

  const GEN_STEPS=["Reading BKT mastery data...","Analyzing error patterns...","Detecting weak skills...","Selecting current skill...","Calibrating difficulty level...","Prompting Groq AI model...","Generating question...","Validating response...","Building training session...","Ready!"];

  // ─── AUTO-SAVE: save state whenever key variables change ──────────────────
  const autoSave = React.useCallback(() => {
    if (!participantEmail) return;
    saveSession(participantEmail, {
      screen, participantName, participantGroup, participantEmail,
      participantId, participantGender, participantMajor, participantYear,
      participantPriorPython, participantHoursPerWeek,
      bkt, preBkt, postBkt,
      preTestAnswers, postTestAnswers, weakSkills,
      sessionNum, sessionResults,
      testIdx, testQuestions, currentSkillIndex, currentSkillQueue,
      askedQuestions, responseTimes, spacedQueue, questionsSinceWrong,
      skillAnswers, trainAnswers, streak, wrongCount, questionCount, skillCorrectStreak,
      errorTypeStats, consentTimestamp, sessionStartTime, phaseTimestamps, uxResponses,
    });
  }, [participantEmail, screen, bkt, preBkt, postBkt, preTestAnswers, postTestAnswers,
      sessionNum, sessionResults, testIdx, testQuestions, currentSkillIndex, currentSkillQueue,
      askedQuestions, responseTimes, spacedQueue, skillAnswers, trainAnswers, questionCount, errorTypeStats,
      consentTimestamp, sessionStartTime, phaseTimestamps, uxResponses]);

  useEffect(() => { autoSave(); }, [autoSave]);

  useEffect(() => {
    if (genError && screen === "training" && !trainQuestion && !aiLoading && autoRetryCountRef.current < 3) {
      const timer = setTimeout(() => {
        autoRetryCountRef.current += 1;
        setGenError(null);
        nextTrainQuestion();
      }, 1500);
      return () => clearTimeout(timer);
    }
    if (!genError && trainQuestion) {
      autoRetryCountRef.current = 0;
    }
  }, [genError, screen, trainQuestion, aiLoading]);

  // ─── CHECK FOR EXISTING SESSION ON EMAIL BLUR ─────────────────────────────
  const checkEmailForResume = (email) => {
    const saved = loadSession(email);
    if (saved && saved.screen && saved.screen !== "register" && saved.screen !== "final-results" && saved.screen !== "consent") {
      setResumeData(saved);
    } else {
      setResumeData(null);
    }
  };

  // ─── RESTORE SESSION ──────────────────────────────────────────────────────
  const restoreSession = (saved) => {
    setParticipantName(saved.participantName||"");
    setParticipantGroup(saved.participantGroup||"adaptive");
    setParticipantEmail(saved.participantEmail||"");
    setParticipantId(saved.participantId||"");
    setParticipantGender(saved.participantGender||"");
    setParticipantMajor(saved.participantMajor||"");
    setParticipantYear(saved.participantYear||"");
    setParticipantPriorPython(saved.participantPriorPython||"");
    setParticipantHoursPerWeek(saved.participantHoursPerWeek||"");
    setBkt(saved.bkt||initBKT());
    setPreBkt(saved.preBkt||null);
    setPostBkt(saved.postBkt||null);
    setPreTestAnswers(saved.preTestAnswers||[]);
    setPostTestAnswers(saved.postTestAnswers||[]);
    setWeakSkills(saved.weakSkills||[]);
    setSessionNum(saved.sessionNum||0);
    setSessionResults(saved.sessionResults||[]);
    setTestIdx(saved.testIdx||0);
    setTestQuestions(saved.testQuestions||[]);
    setCurrentSkillIndex(saved.currentSkillIndex||0);
    setCurrentSkillQueue(saved.currentSkillQueue||[]);
    setAskedQuestions(saved.askedQuestions||[]);
    setResponseTimes(saved.responseTimes||[]);
    setSpacedQueue(saved.spacedQueue||[]);
    setQuestionsSinceWrong(saved.questionsSinceWrong||0);
    setSkillAnswers(saved.skillAnswers||[]);
    setTrainAnswers(saved.trainAnswers||[]);
    setStreak(saved.streak||0);
    setWrongCount(saved.wrongCount||0);
    setQuestionCount(saved.questionCount||0);
    setSkillCorrectStreak(saved.skillCorrectStreak||0);
    setErrorTypeStats(saved.errorTypeStats||{conceptual:{asked:0,correct:0},logical:{asked:0,correct:0},syntax:{asked:0,correct:0}});
    setConsentTimestamp(saved.consentTimestamp||null);
    setSessionStartTime(saved.sessionStartTime||null);
    setPhaseTimestamps(saved.phaseTimestamps||{});
    if(saved.uxResponses) setUxResponses(saved.uxResponses);
    // Navigate to screen — if training, go to generating to re-generate current question
    const targetScreen = saved.screen === "training" ? "generating" : saved.screen;
    if (saved.screen === "training") {
      // Re-generate the current question for the current skill
      const skillQueue = saved.currentSkillQueue || [];
      const skillIdx = saved.currentSkillIndex || 0;
      const skillId = skillQueue[skillIdx];
      const currentBkt = saved.bkt || initBKT();
      setTimeout(() => {
        startTrainingSession(skillQueue, currentBkt, saved.sessionNum || 1);
      }, 100);
    } else {
      setScreen(targetScreen);
    }
    setResumeData(null);
  };

  const startPreTest=()=>{
    setTestQuestions(shuffle(buildBalancedTestQuestions(PRE_TEST_QUESTIONS)));
    setTestIdx(0);setTestSelected(null);setTestShowFeedback(false);setPreTestAnswers([]);
    setQuestionStartTime(Date.now());
    const now = Date.now();
    setSessionStartTime(now);
    setPhaseTimestamps(prev=>({...prev, pretest_start: now}));
    setScreen("pretest");
  };

  const handleTestAnswer=(idx)=>{
    if(testShowFeedback)return;
    setTestSelected(idx);setTestShowFeedback(true);
    const q=testQuestions[testIdx];
    const correct=idx===q.correctIndex;
    const nb={...bkt};nb[q.skill]=updateBKT(nb[q.skill],correct);setBkt(nb);
    const responseTime = questionStartTime ? Date.now() - questionStartTime : 0;
    const ans=[...(screen==="pretest"?preTestAnswers:postTestAnswers),{...q,selected:idx,correct,responseTimeMs:responseTime}];
    if(screen==="pretest")setPreTestAnswers(ans);else setPostTestAnswers(ans);
    // ─── Save test answer to Supabase ────────────────────────────────────────
    const _tq = testQuestions[testIdx];
    sbInsert("test_answers", {
      participant_email: participantEmail,
      phase: screen,
      skill: _tq.skill,
      difficulty: _tq.difficulty,
      error_type: _tq.errorType || "conceptual",
      selected_index: idx,
      correct_index: _tq.correctIndex,
      is_correct: idx === _tq.correctIndex,
      response_time_ms: questionStartTime ? Date.now() - questionStartTime : 0,
      answered_at: new Date().toISOString(),
    });
  };

  const nextTestQuestion=async()=>{
    if(testIdx+1<testQuestions.length){
      setTestIdx(testIdx+1);setTestSelected(null);setTestShowFeedback(false);
      setQuestionStartTime(Date.now());
    } else {
      if(screen==="pretest"){
        const snap={...bkt};setPreBkt(snap);
        const weak=SKILLS.filter(s=>snap[s.id]<MASTERY_THRESHOLD).map(s=>s.id);
        const q=weak.length>0?weak:SKILLS.map(s=>s.id);
        setWeakSkills(q);
        setPhaseTimestamps(prev=>({...prev, pretest_end: Date.now(), training_start: Date.now()}));
        startTrainingSession(q,snap,1);
      } else {
        const finalBkt = {...bkt};
        setPostBkt(finalBkt);
        // ─── Save final summary to Supabase ──────────────────────────────────
        const _preScore  = preTestAnswers.length > 0 ? preTestAnswers.filter(a=>a.correct).length / preTestAnswers.length : 0;
        const _postScore = postTestAnswers.length > 0 ? postTestAnswers.filter(a=>a.correct).length / postTestAnswers.length : 0;
        const _hake      = _preScore < 1 ? ((_postScore - _preScore) / (1 - _preScore)) : 1;
        const _preAvg    = preBkt ? Object.values(preBkt).reduce((a,b)=>a+b,0)/6 : 0.3;
        const _postAvg   = Object.values(finalBkt).reduce((a,b)=>a+b,0)/6;
        const _cohenD    = (_postAvg - _preAvg) / 0.2;
        const _rtAll     = responseTimes;
        const _avgRt     = _rtAll.length > 0 ? _rtAll.reduce((a,r)=>a+r.timeMs,0)/_rtAll.length : 0;
        const _totalTrainQ   = _rtAll.length;
        const _totalCorrect  = _rtAll.filter(r=>r.correct).length;
        const _preTestTotal  = preTestAnswers.length;
        const _preTestCorrect= preTestAnswers.filter(a=>a.correct).length;
        const _postTestTotal = postTestAnswers.length;
        const _postTestCorrect= postTestAnswers.filter(a=>a.correct).length;
        const _skillRt = (skillId) => _rtAll.filter(r=>r.skill===skillId);
        const _skillAcc = (skillId) => { const s=_skillRt(skillId); return s.length>0?Math.round(s.filter(r=>r.correct).length/s.length*100):null; };
        const _sessionDurationMs = phaseTimestamps.posttest_end && phaseTimestamps.pretest_start ? phaseTimestamps.posttest_end - phaseTimestamps.pretest_start : null;
        const finalResultsRow = {
          // ── Identity ──────────────────────────────────────────────────────────
          participant_email:        participantEmail,
          participant_name:         participantName,
          participant_id:           participantId,
          participant_group:        participantGroup,
          participant_gender:       participantGender,
          participant_major:        participantMajor,
          participant_year:         participantYear,
          participant_prior_python: participantPriorPython,
          participant_hours_per_week: participantHoursPerWeek,
          // ── Pre/Post Test Scores ──────────────────────────────────────────────
          pre_score_pct:            Math.round(_preScore * 100),
          post_score_pct:           Math.round(_postScore * 100),
          pre_test_total:           _preTestTotal,
          pre_test_correct:         _preTestCorrect,
          post_test_total:          _postTestTotal,
          post_test_correct:        _postTestCorrect,
          hake_gain:                parseFloat(_hake.toFixed(3)),
          cohen_d:                  parseFloat(_cohenD.toFixed(3)),
          // ── BKT Averages ──────────────────────────────────────────────────────
          bkt_pre_avg:              parseFloat((_preAvg * 100).toFixed(1)),
          bkt_post_avg:             parseFloat((_postAvg * 100).toFixed(1)),
          // ── BKT Per-Skill (Pre) ───────────────────────────────────────────────
          bkt_variables_pre:        preBkt ? parseFloat((preBkt.variables * 100).toFixed(1)) : null,
          bkt_conditions_pre:       preBkt ? parseFloat((preBkt.conditions * 100).toFixed(1)) : null,
          bkt_loops_pre:            preBkt ? parseFloat((preBkt.loops * 100).toFixed(1)) : null,
          bkt_functions_pre:        preBkt ? parseFloat((preBkt.functions * 100).toFixed(1)) : null,
          bkt_lists_pre:            preBkt ? parseFloat((preBkt.lists * 100).toFixed(1)) : null,
          bkt_oop_pre:              preBkt ? parseFloat((preBkt.oop * 100).toFixed(1)) : null,
          // ── BKT Per-Skill (Post) ──────────────────────────────────────────────
          bkt_variables_post:       parseFloat((finalBkt.variables * 100).toFixed(1)),
          bkt_conditions_post:      parseFloat((finalBkt.conditions * 100).toFixed(1)),
          bkt_loops_post:           parseFloat((finalBkt.loops * 100).toFixed(1)),
          bkt_functions_post:       parseFloat((finalBkt.functions * 100).toFixed(1)),
          bkt_lists_post:           parseFloat((finalBkt.lists * 100).toFixed(1)),
          bkt_oop_post:             parseFloat((finalBkt.oop * 100).toFixed(1)),
          // ── Training Summary ──────────────────────────────────────────────────
          sessions_completed:       sessionResults.length,
          session_num_final:        sessionNum,
          total_train_questions:    _totalTrainQ,
          total_train_correct:      _totalCorrect,
          train_accuracy_pct:       _totalTrainQ > 0 ? Math.round(_totalCorrect / _totalTrainQ * 100) : null,
          skills_mastered:          Object.values(finalBkt).filter(v=>v>=0.8).length,
          weak_skills:              weakSkills.join(","),
          // ── Per-Skill Accuracy (Training) ─────────────────────────────────────
          acc_variables_pct:        _skillAcc("variables"),
          acc_conditions_pct:       _skillAcc("conditions"),
          acc_loops_pct:            _skillAcc("loops"),
          acc_functions_pct:        _skillAcc("functions"),
          acc_lists_pct:            _skillAcc("lists"),
          acc_oop_pct:              _skillAcc("oop"),
          // ── Error Type Counts ─────────────────────────────────────────────────
          errors_conceptual:        _rtAll.filter(r=>!r.correct&&r.errorType==="conceptual").length,
          errors_logical:           _rtAll.filter(r=>!r.correct&&r.errorType==="logical").length,
          errors_syntax:            _rtAll.filter(r=>!r.correct&&r.errorType==="syntax").length,
          correct_conceptual:       _rtAll.filter(r=>r.correct&&r.errorType==="conceptual").length,
          correct_logical:          _rtAll.filter(r=>r.correct&&r.errorType==="logical").length,
          correct_syntax:           _rtAll.filter(r=>r.correct&&r.errorType==="syntax").length,
          // ── Response Time ─────────────────────────────────────────────────────
          avg_response_time_ms:     Math.round(_avgRt),
          session_duration_ms:      _sessionDurationMs,
          // ── Timestamps ───────────────────────────────────────────────────────
          completed_at:             new Date().toISOString(),
        };
        await saveFinalResults(finalResultsRow);
        // ─── Save BKT snapshots ───────────────────────────────────────────────
        if(preBkt) {
          Object.entries(preBkt).forEach(([skill, val]) => {
            sbInsert("bkt_snapshots", {
              participant_email: participantEmail,
              phase: "pre",
              skill, bkt_value: parseFloat(val.toFixed(4)),
              recorded_at: new Date().toISOString(),
            });
          });
        }

  const startTrainingSession=async(skillQueue,currentBkt,sessNum)=>{
    setScreen("generating");setGenProgress(0);setGenStep(0);setGenError(null);
    setSessionNum(sessNum);setCurrentSkillIndex(0);setCurrentSkillQueue(skillQueue);
    setTrainAnswers([]);setSkillAnswers([]);setStreak(0);setWrongCount(0);setSessionLog([]);setQuestionCount(0);
    setSpacedQueue([]);setQuestionsSinceWrong(0);setSkillCorrectStreak(0);
    setErrorTypeStats({conceptual:{asked:0,correct:0},logical:{asked:0,correct:0},syntax:{asked:0,correct:0}});
    for(let i=0;i<GEN_STEPS.length-1;i++){
      await new Promise(r=>setTimeout(r,280));
      setGenStep(i+1);setGenProgress((i+1)*10);
    }
    try{
      const skillId=skillQueue[0];
      const q=await generateAIQuestion(skillId,getDifficulty(currentBkt[skillId]),currentBkt[skillId],[],sessNum,askedQuestions);
      setTrainQuestion(q);setGenStep(10);setGenProgress(100);
      await new Promise(r=>setTimeout(r,400));
      setTrainSelected(null);setTrainShowFeedback(false);setAiFeedback(null);
      setAskedQuestions(prev=>{
        const usedTexts=new Set(prev.map(a=>a.questionText));
        return usedTexts.has(q.questionText)?prev:[...prev,{...q, outcome:"pending", reviewedOnce:false}];
      });
      setQuestionStartTime(Date.now());
      setScreen("training");
    }catch(e){setGenError(`AI Error: ${e.message}`);}
  };

  const handleTrainAnswer=async(idx)=>{
    if(trainShowFeedback)return;
    setTrainSelected(idx);setTrainShowFeedback(true);
    const q=trainQuestion;
    const correct=Number(idx)===Number(q.correctIndex);  // strict number comparison
    const nb={...bkt};nb[q.skill]=updateBKT(nb[q.skill],correct);setBkt(nb);
    const ns=correct?streak+1:0;setStreak(ns);
    if(!correct)setWrongCount(w=>w+1);
    const entry=correct?`✅ ${q.skill} → ${Math.round(nb[q.skill]*100)}%`:`❌ ${q.skill} → ${Math.round(nb[q.skill]*100)}%`;
    setSessionLog(l=>[entry,...(ns>=3?[`🔥 ${ns}-streak!`]:[]),...l]);

    // ─── Per-ErrorType Stats Tracking ─────────────────────────────────
    const et = q.errorType || "conceptual";
    setErrorTypeStats(prev => ({
      ...prev,
      [et]: { asked: (prev[et]?.asked||0)+1, correct: (prev[et]?.correct||0)+(correct?1:0) }
    }));

    // ─── Response Time Tracking ────────────────────────────────────────
    const responseTime = questionStartTime ? Date.now() - questionStartTime : 0;
    setResponseTimes(prev=>[...prev,{skill:q.skill, difficulty:q.difficulty, timeMs:responseTime, correct, errorType:q.errorType||"conceptual", questionText:q.questionText?.slice(0,60)}]);

    // ─── Spaced Repetition: wrong answers re-enter ONCE after 2-3 questions ─
    // RULES:
    // - Correct answer → never repeat this question, ever.
    // - Wrong answer (first attempt) → queue for review once, then never again.
    // - Wrong answer on the spaced-review repeat → don't queue again (already reviewed).
    const newQSinceWrong = questionsSinceWrong + 1;
    setQuestionsSinceWrong(newQSinceWrong);
    const isReviewAttempt = q.spacedRepeat === true;
    if(!correct && !isReviewAttempt){
      const delay = 2 + Math.floor(Math.random()*2); // 2 or 3
      setSpacedQueue(prev => {
        // Don't queue the same question twice
        if (prev.some(sq => sq.question.questionText === q.questionText)) return prev;
        return [...prev, {question:{...q, spacedRepeat:true}, showAfterCount: newQSinceWrong + delay}];
      });
    }

    // ─── Update outcome on askedQuestions so the AI deduplicator knows the history ─
    // Match by questionText (already stored). Set outcome + reviewedOnce.
    setAskedQuestions(prev => prev.map(aq => {
      if (aq.questionText !== q.questionText) return aq;
      // If this was already a review attempt, mark as reviewedOnce regardless of outcome
      const reviewedOnce = isReviewAttempt ? true : (aq.reviewedOnce || false);
      return { ...aq, outcome: correct ? "correct" : "wrong", reviewedOnce };
    }));

    // ─── Mastery Gate: track consecutive correct ──────────────────────
    setSkillCorrectStreak(prev => correct ? prev + 1 : 0);

    // ─── Behavioral streak tracking (for adaptive difficulty override) ─
    if(correct){
      setCorrectStreak(prev => prev + 1);
      setWrongStreak(0);
    } else {
      setWrongStreak(prev => prev + 1);
      setCorrectStreak(0);
    }

    // ─── Error-Based Remediation: capture misconception, clear on success ─
    if(!correct){
      setLastWrongQuestion({
        questionText: q.questionText,
        code: q.code || null,
        misconception: q.misconception || null,
        errorType: q.errorType || "conceptual",
        skill: q.skill,
        difficulty: q.difficulty,
      });
      setRemediationActive(true);
      setRemediationCount(0);
    } else if(remediationActive){
      // Student got the remediation question right → concept addressed
      setRemediationActive(false);
      setLastWrongQuestion(null);
      setRemediationCount(0);
      setSessionLog(l=>[`🎯 Misconception addressed — moving on`,...l]);
    }

    const upd={...q,selected:idx,correct,responseTimeMs:responseTime};
    setTrainAnswers(prev=>[...prev,upd]);setSkillAnswers(prev=>[...prev,upd]);setQuestionCount(n=>n+1);
    // ─── Save training answer to Supabase ────────────────────────────────────
    sbInsert("training_answers", {
      participant_email: participantEmail,
      session_num: sessionNum,
      skill: q.skill,
      difficulty: q.difficulty,
      error_type: q.errorType || "conceptual",
      selected_index: idx,
      correct_index: q.correctIndex,
      is_correct: correct,
      is_spaced_repeat: q.spacedRepeat || false,
      is_ai_generated: q.aiGenerated || false,
      response_time_ms: responseTime,
      bkt_after: nb[q.skill],

      difficulty_source: difficultySource,
      wrong_streak: wrongStreak,
      correct_streak: correctStreak,
      is_remediation: q.isRemediation || false,
    });
    if(!correct){
      setAiLoading(true);
      try{const fb=await generateAIFeedback(q,idx,nb[q.skill]);setAiFeedback(fb);}catch{}
      setAiLoading(false);
    }
  };

  const nextTrainQuestion=async()=>{

    if(isMastered){

    }
    if(questionCount>=8){await advanceToNextSkill();return;}

    // ─── Spaced Repetition: check if any queued question is due ─────
    const currentCount = questionsSinceWrong + 1;
    setQuestionsSinceWrong(currentCount);
    const dueIdx = spacedQueue.findIndex(sq => sq.showAfterCount <= currentCount);
    if(dueIdx !== -1){
      const dueItem = spacedQueue[dueIdx];
      setSpacedQueue(prev => prev.filter((_,i) => i !== dueIdx));

      setTrainQuestion({...dueItem.question, spacedRepeat:true});

      return;
    }

    setTrainShowFeedback(false);setTrainSelected(null);setAiFeedback(null);setAiLoading(true);setTrainQuestion(null);setGenError(null);setShowTracer(false);
    try{
      const wrong=skillAnswers.filter(a=>!a.correct);

      // ─── Error-Based Remediation: if active and same skill, override difficulty & inject misconception ─
      const isRemediation = remediationActive && lastWrongQuestion && lastWrongQuestion.skill === skillId && remediationCount < 2;
      let finalDiff, source, remediationCtx = null;
      if(isRemediation){
        // Step down one level from the wrong question's difficulty
        const stepDown = { hard: "medium", medium: "easy", easy: "easy" };
        finalDiff = stepDown[lastWrongQuestion.difficulty] || "easy";
        source = "remediation";
        remediationCtx = lastWrongQuestion;
        setRemediationCount(c => c + 1);
      } else {
        finalDiff = getFinalDifficulty(bkt[skillId],wrongStreak,correctStreak);

      setDifficultySource(source);
      const q=await generateAIQuestion(skillId,finalDiff,bkt[skillId],wrong,sessionNum,askedQuestions,remediationCtx);
      if(remediationCtx) q.isRemediation = true;
      setTrainQuestion(q);
      setAskedQuestions(prev=>{
        return prev.some(aq=>isSimilar(q,aq))?prev:[...prev,{...q, outcome:"pending", reviewedOnce:false}];
      });
      setQuestionStartTime(Date.now());
      if(isRemediation){

      }
    }catch(e){setGenError(`فشل توليد السؤال. اضغط "حاول مجدداً".`);}
    finally{setAiLoading(false);}
  };

          <div style={{display:"flex",gap:12,justifyContent:"center"}}>
            <button onClick={()=>{setScreen("register");setConsentGiven(false);}}
              style={{background:"transparent",color:C.textM,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 28px",fontSize:13,fontFamily:font,cursor:"pointer"}}>

            </button>
            <button onClick={()=>{
              if(!consentGiven) return;
              const ts = new Date().toISOString();

              sbUpsert("participants", { email: participantEmail, consent_given: true, consent_timestamp: ts });

              setPhaseTimestamps(prev=>({...prev, pretest_start: Date.now()}));

        </div>
      </div>

  }

  // ─── UX QUESTIONNAIRE SCREEN ──────────────────────────────────────────────
  if(screen==="ux-questionnaire"){
    const uxQuestions = [
      {key:"ease_of_use", label:"Ease of Use", question:"How easy was the platform to navigate and use?", emoji:["😣","😕","😐","🙂","😊"]},
      {key:"question_quality", label:"Question Quality", question:"How would you rate the quality and relevance of the questions?", emoji:["😣","😕","😐","🙂","😊"]},

      {key:"adaptive_accuracy", label:"Adaptive Accuracy", question:"How well did the system adapt to your skill level?", emoji:["😣","😕","😐","🙂","😊"]},
      {key:"overall_satisfaction", label:"Overall Satisfaction", question:"How satisfied are you with the overall learning experience?", emoji:["😣","😕","😐","🙂","😊"]},
      {key:"would_recommend", label:"Recommendation", question:"How likely are you to recommend this platform to a friend?", emoji:["😣","😕","😐","🙂","😊"]},
    ];
    const scaleLabels = ["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"];
    const allAnswered = uxQuestions.every(q => uxResponses[q.key] !== null);
    const totalTime = sessionStartTime && sessionEndTime ? Math.round((sessionEndTime - sessionStartTime)/1000) : 0;
    const formatTime = (s) => {const m=Math.floor(s/60);const sec=s%60;return `${m}m ${sec}s`;};

    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(180deg, #070b14 0%, #0d1424 100%)",fontFamily:sans,padding:20}}>

          {/* Header */}
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:10,background:`${C.success}15`,border:`1px solid ${C.success}33`,borderRadius:100,padding:"8px 20px",marginBottom:16}}>
              <span style={{fontSize:18}}>📋</span>
              <span style={{color:C.success,fontSize:13,fontWeight:700,fontFamily:font}}>Almost Done!</span>
            </div>
            <h1 style={{color:C.text,fontSize:24,fontWeight:800,fontFamily:font,margin:"0 0 8px"}}>User Experience Feedback</h1>
            <p style={{color:C.textM,fontSize:12,margin:0}}>Your feedback helps us improve the learning experience</p>
          </div>

          {/* Session Time Summary */}
          {totalTime > 0 && (
            <div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}33`,borderRadius:12,padding:16,marginBottom:20,textAlign:"center"}}>
              <div style={{color:C.accentL,fontSize:10,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>⏱️ Total Session Duration</div>
              <div style={{color:C.text,fontSize:28,fontWeight:800,fontFamily:font}}>{formatTime(totalTime)}</div>
              <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                {phaseTimestamps.pretest_start && phaseTimestamps.pretest_end && (
                  <span style={{color:C.textD,fontSize:11,fontFamily:font}}>📝 Pre-Test: {formatTime(Math.round((phaseTimestamps.pretest_end - phaseTimestamps.pretest_start)/1000))}</span>
                )}
                {phaseTimestamps.training_start && phaseTimestamps.training_end && (
                  <span style={{color:C.textD,fontSize:11,fontFamily:font}}>🤖 Training: {formatTime(Math.round((phaseTimestamps.training_end - phaseTimestamps.training_start)/1000))}</span>
                )}
                {phaseTimestamps.posttest_start && phaseTimestamps.posttest_end && (
                  <span style={{color:C.textD,fontSize:11,fontFamily:font}}>📊 Post-Test: {formatTime(Math.round((phaseTimestamps.posttest_end - phaseTimestamps.posttest_start)/1000))}</span>
                )}
              </div>
            </div>
          )}

          {/* Likert Scale Questions */}
          <div style={{background:"#111827",border:`1px solid ${C.border}`,borderRadius:16,padding:24,marginBottom:20}}>
            {uxQuestions.map((q, qIdx) => (
              <div key={q.key} style={{marginBottom:qIdx<uxQuestions.length-1?24:0,paddingBottom:qIdx<uxQuestions.length-1?24:0,borderBottom:qIdx<uxQuestions.length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:`${C.accent}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.accentL,fontWeight:800,fontFamily:font,flexShrink:0}}>{qIdx+1}</div>
                  <div>
                    <div style={{color:C.text,fontSize:13,fontWeight:600}}>{q.question}</div>
                    <div style={{color:C.textM,fontSize:10,fontFamily:font,marginTop:2}}>{q.label}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"center",marginLeft:32}}>
                  {[1,2,3,4,5].map(val => {
                    const selected = uxResponses[q.key] === val;
                    const colors = [C.error, "#f97316", C.warning, "#22d3ee", C.success];
                    const activeColor = colors[val-1];
                    return(
                      <button key={val} onClick={()=>setUxResponses(prev=>({...prev,[q.key]:val}))}
                        style={{
                          display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                          padding:"10px 12px",borderRadius:10,cursor:"pointer",minWidth:60,
                          background:selected?`${activeColor}20`:C.bgHover,
                          border:`2px solid ${selected?activeColor:C.border}`,
                          transition:"all 0.2s",transform:selected?"scale(1.05)":"scale(1)"
                        }}>
                        <span style={{fontSize:22}}>{q.emoji[val-1]}</span>
                        <span style={{fontSize:9,fontFamily:font,color:selected?activeColor:C.textM,fontWeight:selected?700:400}}>{val}</span>
                        <span style={{fontSize:8,fontFamily:font,color:selected?activeColor:C.textM,textAlign:"center",lineHeight:1.2}}>{scaleLabels[val-1]}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* Open-ended feedback */}
          <div style={{background:"#111827",border:`1px solid ${C.border}`,borderRadius:16,padding:24,marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:16}}>💬</span>
              <div style={{color:C.text,fontSize:13,fontWeight:600}}>Any additional feedback or suggestions? (Optional)</div>
            </div>
            <textarea
              value={uxResponses.open_feedback}
              onChange={e=>setUxResponses(prev=>({...prev,open_feedback:e.target.value}))}

            />
          </div>

          {/* Submit */}
          <div style={{textAlign:"center"}}>
            <button onClick={()=>{
              // Save UX responses to Supabase
              sbInsert("ux_responses", {
                participant_email: participantEmail,
                ease_of_use: uxResponses.ease_of_use,
                question_quality: uxResponses.question_quality,
                feedback_helpfulness: uxResponses.feedback_helpfulness,
                adaptive_accuracy: uxResponses.adaptive_accuracy,
                overall_satisfaction: uxResponses.overall_satisfaction,
                would_recommend: uxResponses.would_recommend,
                open_feedback: uxResponses.open_feedback || null,
                total_session_seconds: totalTime,
                pretest_seconds: phaseTimestamps.pretest_start && phaseTimestamps.pretest_end ? Math.round((phaseTimestamps.pretest_end - phaseTimestamps.pretest_start)/1000) : null,
                training_seconds: phaseTimestamps.training_start && phaseTimestamps.training_end ? Math.round((phaseTimestamps.training_end - phaseTimestamps.training_start)/1000) : null,
                posttest_seconds: phaseTimestamps.posttest_start && phaseTimestamps.posttest_end ? Math.round((phaseTimestamps.posttest_end - phaseTimestamps.posttest_start)/1000) : null,

            </button>
            {!allAnswered&&<p style={{color:C.warning,fontSize:11,marginTop:8,fontFamily:font}}>⚠️ Please rate all {uxQuestions.length} items above</p>}
          </div>
        </div>
      </div>
